<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" fill="none">
  <defs>
    <linearGradient id="cg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stopColor="#0a1628"/><stop offset="50%" stopColor="#1a3a5c"/><stop offset="100%" stopColor="#0d2137"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="4"/><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="1200" height="600" fill="url(#cg)"/>
  <!-- Office building outline -->
  <rect x="350" y="80" width="500" height="380" rx="8" stroke="#E8B960" strokeWidth="2" fill="none" opacity="0.7"/>
  <line x1="350" y1="180" x2="850" y2="180" stroke="#E8B960" strokeWidth="1" opacity="0.4"/>
  <line x1="350" y1="280" x2="850" y2="280" stroke="#E8B960" strokeWidth="1" opacity="0.4"/>
  <line x1="350" y1="380" x2="850" y2="380" stroke="#E8B960" strokeWidth="1" opacity="0.4"/>
  <!-- Vastu zones labeled -->
  <rect x="80" y="100" width="160" height="110" rx="10" stroke="#10B981" strokeWidth="1.5" fill="rgba(16,185,129,0.08)"/>
  <text x="160" y="145" textAnchor="middle" fontSize="16" fill="#10B981" fontFamily="serif">North (Kuber)</text>
  <text x="160" y="168" textAnchor="middle" fontSize="12" fill="#10B981" opacity="0.7">Wealth · Opportunities</text>
  <rect x="960" y="380" width="160" height="110" rx="10" stroke="#C88A5D" strokeWidth="1.5" fill="rgba(200,138,93,0.08)"/>
  <text x="1040" y="425" textAnchor="middle" fontSize="16" fill="#C88A5D" fontFamily="serif">South-West</text>
  <text x="1040" y="448" textAnchor="middle" fontSize="12" fill="#C88A5D" opacity="0.7">Owner · Stability</text>
  <!-- Central Kuber Yantra -->
  <circle cx="600" cy="270" r="50" stroke="#FFD700" strokeWidth="2" fill="none" opacity="0.7" filter="url(#glow)"/>
  <circle cx="600" cy="270" r="20" fill="#FFD700" opacity="0.5" filter="url(#glow)"/>
  <text x="600" y="278" textAnchor="middle" fontSize="22" fill="#0a1628" fontWeight="bold" fontFamily="serif">K</text>
  <!-- Cash counter indicator -->
  <rect x="480" y="440" width="240" height="40" rx="6" stroke="#E8B960" strokeWidth="1.5" fill="rgba(232,185,96,0.1)"/>
  <text x="600" y="466" textAnchor="middle" fontSize="14" fill="#E8B960">Cash Counter → North</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" fill="none">
  <defs>
    <linearGradient id="sg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stopColor="#0a0020"/><stop offset="50%" stopColor="#1a0040"/><stop offset="100%" stopColor="#0a0020"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="4"/><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="1200" height="600" fill="url(#sg)"/>
  <!-- Temple silhouette -->
  <path d="M450 400 L450 220 L530 130 L600 170 L670 130 L750 220 L750 400" stroke="#FFD700" strokeWidth="2" fill="none" opacity="0.7"/>
  <circle cx="600" cy="260" r="30" stroke="#FFD700" strokeWidth="1.5" fill="none" opacity="0.5" filter="url(#glow)"/>
  <text x="600" y="270" textAnchor="middle" fontSize="24" fill="#FFD700" fontFamily="serif" opacity="0.8">ॐ</text>
  <!-- NE corner glow -->
  <circle cx="130" cy="80" r="50" fill="rgba(255,215,0,0.08)" filter="url(#glow)"/>
  <text x="130" y="85" textAnchor="middle" fontSize="14" fill="#10B981" fontFamily="serif">NE · Ishanya</text>
  <!-- Floating om symbols -->
  <text x="950" y="150" fontSize="18" fill="#FFD700" opacity="0.15" fontFamily="serif">ॐ</text>
  <text x="80" y="400" fontSize="14" fill="#FFD700" opacity="0.12" fontFamily="serif">ॐ</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" fill="none">
  <defs>
    <linearGradient id="rg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stopColor="#3a0a0a"/><stop offset="50%" stopColor="#C10000"/><stop offset="100%" stopColor="#5D4037"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="4"/><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="1200" height="600" fill="url(#rg)"/>
  <!-- Vastu Purusha Mandala outline -->
  <rect x="400" y="60" width="400" height="400" stroke="#E8B960" strokeWidth="2" fill="none" opacity="0.6"/>
  <line x1="400" y1="260" x2="800" y2="260" stroke="#E8B960" strokeWidth="1" opacity="0.4"/>
  <line x1="600" y1="60" x2="600" y2="460" stroke="#E8B960" strokeWidth="1" opacity="0.4"/>
  <line x1="400" y1="60" x2="800" y2="460" stroke="#E8B960" strokeWidth="1" opacity="0.4"/>
  <line x1="800" y1="60" x2="400" y2="460" stroke="#E8B960" strokeWidth="1" opacity="0.4"/>
  <circle cx="600" cy="260" r="120" stroke="#E8B960" strokeWidth="1.5" fill="none" opacity="0.5"/>
  <circle cx="600" cy="260" r="80" stroke="#FF9933" strokeWidth="1" fill="none" opacity="0.4"/>
  <circle cx="600" cy="260" r="25" fill="#E8B960" opacity="0.7" filter="url(#glow)"/>
  <text x="600" y="272" textAnchor="middle" fontSize="30" fill="#1A0000" fontWeight="bold" fontFamily="serif">ॐ</text>
  <!-- Room icons floating -->
  <rect x="50" y="80" width="180" height="130" rx="12" stroke="#E8B960" strokeWidth="1.5" fill="rgba(255,255,255,0.05)"/>
  <text x="140" y="135" textAnchor="middle" fontSize="18" fill="#E8B960" fontFamily="serif">Master Bedroom</text>
  <rect x="50" y="250" width="180" height="130" rx="12" stroke="#E8B960" strokeWidth="1.5" fill="rgba(255,255,255,0.05)"/>
  <text x="140" y="305" textAnchor="middle" fontSize="18" fill="#E8B960" fontFamily="serif">Kitchen</text>
  <rect x="970" y="80" width="180" height="130" rx="12" stroke="#E8B960" strokeWidth="1.5" fill="rgba(255,255,255,0.05)"/>
  <text x="1060" y="135" textAnchor="middle" fontSize="18" fill="#E8B960" fontFamily="serif">Living Room</text>
  <rect x="970" y="250" width="180" height="130" rx="12" stroke="#E8B960" strokeWidth="1.5" fill="rgba(255,255,255,0.05)"/>
  <text x="1060" y="305" textAnchor="middle" fontSize="18" fill="#E8B960" fontFamily="serif">Pooja Room</text>
</svg>

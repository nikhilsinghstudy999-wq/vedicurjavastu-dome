<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD700" />
      <stop offset="50%" stop-color="#FFA500" />
      <stop offset="100%" stop-color="#FF8C00" />
    </linearGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF9933" />
      <stop offset="50%" stop-color="#E8B960" />
      <stop offset="100%" stop-color="#C10000" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      @keyframes spin-reverse {
        from { transform: rotate(360deg); }
        to { transform: rotate(0deg); }
      }
      @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.05); }
      }
      .ring-outer { animation: spin 4s linear infinite; transform-origin: 50px 50px; }
      .ring-inner { animation: spin-reverse 3s linear infinite; transform-origin: 50px 50px; }
      .dots { animation: spin 6s linear infinite; transform-origin: 50px 50px; }
      .v-pulse { animation: pulse 2s ease-in-out infinite; transform-origin: 50px 50px; }
    </style>
  </defs>
  
  <circle cx="50" cy="50" r="48" fill="#1A1A2E" stroke="url(#ringGrad)" stroke-width="2.5"/>
  
  <g class="ring-outer">
    <circle cx="50" cy="50" r="42" fill="none" stroke="url(#gold)" stroke-width="1.5" stroke-dasharray="8 6" opacity="0.7"/>
    <circle cx="50" cy="50" r="36" fill="none" stroke="#FF9933" stroke-width="0.8" stroke-dasharray="4 8" opacity="0.5"/>
  </g>
  
  <g class="ring-inner">
    <circle cx="50" cy="50" r="30" fill="none" stroke="#E8B960" stroke-width="1" stroke-dasharray="5 5" opacity="0.6"/>
  </g>
  
  <g class="dots">
    <circle cx="50" cy="14" r="2.5" fill="#FFD700" opacity="0.8"/>
    <circle cx="50" cy="86" r="2.5" fill="#FFD700" opacity="0.8"/>
    <circle cx="14" cy="50" r="2.5" fill="#FFD700" opacity="0.8"/>
    <circle cx="86" cy="50" r="2.5" fill="#FFD700" opacity="0.8"/>
  </g>
  
  <g class="v-pulse" filter="url(#glow)">
    <text x="50" y="72" font-family="Georgia, serif" font-size="58" font-weight="bold" fill="url(#gold)" text-anchor="middle">V</text>
  </g>
</svg>
